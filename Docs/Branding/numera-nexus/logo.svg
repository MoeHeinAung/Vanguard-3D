<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="nn-g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06d0ea" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#1c78e8" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="nn-glow" x1="70%" y1="30%" x2="30%" y2="85%">
      <stop offset="0%"   stop-color="#7df9ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="nn-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nn-mark" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6"
                    flood-color="#06d0ea" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="400" height="400" rx="56" fill="#0c1445"/>

  <!-- DIAGONAL TRANSITION BAND -->
  <polygon points="0,0 400,0 300,200 0,300" fill="#0f1840"/>
  <polygon points="0,300 300,200 400,200 400,400 0,400"
           fill="#0b1038"/>

  <!-- FACE GLOW from cube bottom -->
  <polygon points="80,240 220,240 290,340 60,340"
           fill="url(#nn-glow)" filter="url(#nn-blur)" opacity="0.6"/>

  <!-- ── CUBE MARK ISOMETRIC BLOCK ── -->
  <g transform="translate(-10,55)" filter="url(#nn-mark)">
    <!-- LEFT (deep-violet) -->
    <path d="M 170,70 L 108,106 L 108,218 L 170,182 Z"
          fill="#1c78e8" opacity="0.86"/>
    <!-- TOP (cyan-teal) -->
    <path d="M 108,106 L 170,70 L 232,106 L 170,142 Z"
          fill="#06d0ea" opacity="0.91"/>
    <!-- RIGHT (electric blue) -->
    <path d="M 170,142 L 232,106 L 232,218 L 170,254 Z"
          fill="#4f8ef7" opacity="0.87"/>
    <!-- BOTTOM FLOOR (lighter violet) -->
    <path d="M 170,254 L 232,218 L 232,228 L 170,264 L 108,228 L 108,218 Z"
          fill="#a78bfa" opacity="0.55"/>
  </g>

  <!-- CUBE HIGHLIGHT / TOP-GLOW -->
  <path d="M 108,106 L 170,70 L 232,106 Z"
        fill="#7df9ff" opacity="0.22" filter="url(#nn-blur)"/>

  <!-- RIM LIGHT -->
  <rect x="12" y="12" width="376" height="376" rx="48"
        fill="none" stroke="url(#nn-g1)" stroke-width="1" opacity="0.30"/>

  <!-- ── WORDMARK — NUMERA ── -->
  <text font-family="'Arial Black','Bahnschrift','Segoe UI',sans-serif"
        font-size="64" font-weight="900" letter-spacing="-2.5"
        fill="white" opacity="0.95"
        transform="translate(200,285) rotate(-0.5)">
    <tspan fill="white" opacity="0.95">NUMERA</tspan>
    <tspan dx="14" fill="#7df9ff" font-size="57">.NEX</tspan>
  </text>

  <!-- ── TAGLINE ── -->
  <text x="52" y="311"
        font-family="'Bahnschrift','Segoe UI',Arial,system-ui,sans-serif"
        font-size="10" letter-spacing="8.5" font-weight="400"
        fill="#7df9ff" opacity="0.65">
    NETWORK OPERATIONS · ANALYTICS · ENGINE
  </text>

  <!-- BOTTOM DOT GRID (terminal aesthetic) -->
  <g fill="#7df9ff" opacity="0.25">
    <circle cx="64"  cy="340" r="1.6"/><circle cx="80"  cy="340" r="1.6"/>
    <circle cx="96"  cy="340" r="1.6"/><circle cx="112" cy="340" r="1.6"/>
    <circle cx="128" cy="340" r="1.6"/><circle cx="144" cy="340" r="1.6"/>
    <circle cx="160" cy="340" r="1.6"/><circle cx="176" cy="340" r="1.6"/>
    <circle cx="192" cy="340" r="1.6"/><circle cx="208" cy="340" r="1.6"/>
    <circle cx="224" cy="340" r="1.6"/><circle cx="240" cy="340" r="1.6"/>
    <circle cx="256" cy="340" r="1.6"/><circle cx="272" cy="340" r="1.6"/>
    <circle cx="288" cy="340" r="1.6"/><circle cx="304" cy="340" r="1.6"/>
    <circle cx="320" cy="340" r="1.6"/><circle cx="336" cy="340" r="1.6"/>
  </g>
</svg>
